backend:
  name: git-gateway
  repo: Mosaid595/herbalaurum-store
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price (PKR)", name: "price", widget: "number" }
      - { label: "Description", name: "body", widget: "markdown" }
      - { label: "Product Image", name: "image", widget: "image" }

  - name: "settings"
    label: "Website Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "theme"
        label: "Theme & Colors"
        file: "data/theme.json"
        fields:
          - { label: "Primary Color (Buttons/Headers)", name: "primary_color", widget: "color", default: "#2E5A44" }
          - { label: "Background Color", name: "bg_color", widget: "color", default: "#ffffff" }
          - { label: "Font Style", name: "font_family", widget: "select", options: ["Poppins", "Playfair Display", "Roboto", "Montserrat"], default: "Poppins" }
          - { label: "Layout Style", name: "layout", widget: "select", options: ["Minimalist Grid", "Classic List"], default: "Minimalist Grid" }
