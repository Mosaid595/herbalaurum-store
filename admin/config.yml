backend:
  name: git-gateway
  repo: Mosaid595/herbalaurum-store
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price (PKR)", name: "price", widget: "number" }
      - { label: "Description", name: "body", widget: "markdown" }
      - { label: "Product Image", name: "image", widget: "image" }

  - name: "settings"
    label: "Website Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "theme"
        label: "Theme & Colors"
        file: "data/theme.json"
        fields:
          - { label: "Primary Color (Buttons/Headers)", name: "primary_color", widget: "color", default: "#2E5A44" }
          - { label: "Background Color", name: "bg_color", widget: "color", default: "#ffffff" }
          - { label: "Background Image (Optional)", name: "bg_image", widget: "image", required: false }
          - { label: "Font Style", name: "font_family", widget: "select", options: ["Poppins", "Playfair Display", "Roboto", "Montserrat"], default: "Poppins" }
          - { label: "Layout Style", name: "layout", widget: "select", options: ["Minimalist Grid", "Classic List"], default: "Minimalist Grid" }

      - name: "homepage"
        label: "Homepage Content"
        file: "data/homepage.json"
        fields:
          - { label: "Hero Main Heading", name: "hero_title", widget: "string", default: "Natural Care for Your Beautiful Hair" }
          - { label: "Hero Subtitle", name: "hero_text", widget: "text", default: "Minimalist, plant-based formulas crafted to restore strength, shine, and natural growth." }
          - { label: "Hero Background Image", name: "hero_image", widget: "image" }
          - { label: "About Us Heading", name: "about_title", widget: "string", default: "Our Organic Philosophy" }
          - { label: "About Us Content", name: "about_text", widget: "text", default: "StrandFlora is specially crafted from rare natural herbs..." }
          - { label: "About Us Image", name: "about_image", widget: "image" }
